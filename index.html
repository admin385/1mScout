function initMap() {
  const anchor = { lng:-117.86359, lat:33.66848 };
  const map = new google.maps.Map(document.getElementById("map"), { zoom:17, center:anchor,});

  new google.maps.Marker({
    position: anchor,
    title: "WFBank",
    map,
  });
}


</head>

<body style="height:100%; margin:0; padding:0;>
<input value=17 onChange="initMap()>
<hr size=1>
<div id=map style="height:100%">


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmrLN2z0y1M2Dg8hvhfBckywh_kDXQC_k" async callback="initMap"> </script>
  
</body>
