<!doctype HTML>

<html>

<head>

<title>1M Scout</title>

<META HTTP-EQUIV="Pragma" CONTENT="no-cache">
<META HTTP-EQUIV="Expires" CONTENT="-1">

<link rel="stylesheet" type="text/css" href='style.css' />
  
<script src="UTMProj.js"> </script>
<!-- script src="maplabel1.js"> </script -->

<script>

const R_deg = Math.PI / 180  // Radians per degree
const deg_m = 90 / 1e7  // degrees per m

var anchor = { lat:33.66848 ,lng:-117.86359 }, icon = 'plus-sign2t.png', level = 16, title = "WFBank"
var map, mark, tile, cell

function initMap() {
// Initialize (create) the map, showing anchor
//console.log(anchor, toLL(toUTM(anchor)))  // prove-up projections
  map = new google.maps.Map(document.getElementById("map"), { center:anchor, zoom:level, })
	icon = {url:icon, size:new google.maps.Size(17,15), anchor:new google.maps.Point(8,8)};  // tweak position
  mark = new google.maps.Marker({ icon:icon, position:anchor, title:title, map, })
//drawATile()
  tile = drawBox(1000, "#f0f")
  cell = drawBox(-10, "#ff0")
}
  
function drawATile() {
// Draw approximate 1x1 km anchor tile, based on local LL approx
  const tile=[]
  var u = toUTM(anchor); u.Eing -= u.Eing%10; u.Ning -= u.Ning%10  // UTM of anchor; sets U.Zone 
  var cosLat = Math.cos(anchor.lat*R_deg)
  tile[0] = {lng:(anchor.lng -(500*deg_m)/cosLat), lat:(anchor.lat -(500*deg_m))}
  tile[1] = {lng:(anchor.lng +(500*deg_m)/cosLat), lat:(anchor.lat -(500*deg_m))}
  tile[2] = {lng:(anchor.lng +(500*deg_m)/cosLat), lat:(anchor.lat +(500*deg_m))}
  tile[3] = {lng:(anchor.lng -(500*deg_m)/cosLat), lat:(anchor.lat +(500*deg_m))}
  tile.push(tile[0])
  new google.maps.Polyline({ path:tile, strokeColor:'#f00', strokeWeight:2, map, })
}

function drawBox(size, color) { 
// Draw a box surrounding anchor modulo 10m, at size distance from anchor (+sided if negative)
  const box=[]
  var s2 = Math.abs(size)/2
  var u = toUTM(anchor) // console.log(anchor, u.Zone); NB: also sets u.Zone
  var uEm = u.Eing -= u.Eing%10, uNm = u.Ning -= u.Ning%10  // round down to 10m cell
  uEm = uEm -(size<0?0:s2); uNm = uNm -(size<0?0:s2) // set LL corner
  box[0] = toLL({Eing:uEm +0, Ning:uNm +0}, u.Zone)
  box[1] = toLL({Eing:uEm +2*s2, Ning:uNm +0}, u.Zone)
  box[2] = toLL({Eing:uEm +2*s2, Ning:uNm +2*s2}, u.Zone)
  box[3] = toLL({Eing:uEm +0, Ning:uNm +2*s2}, u.Zone)
  box.push(box[0])
  return new google.maps.Polyline({ path:box, strokeColor:color, strokeWeight:1.5, map })
}
  
function shiftMap(th) {
// Re-anchor the map
  var a, t = th.replaceAll(" ",""), i = t.indexOf(",")
  anchor = {lat:parseFloat(t.slice(0,i)), lng:parseFloat(t.slice(i+1))}
  map.setCenter(anchor)
  mark.setMap(); mark = new google.maps.Marker({ icon:icon, position:anchor, title:"", map, })
  tile.setMap(); tile = drawBox(1000, "#f0f")
  cell.setMap(); cell = drawBox(-10, "#ff0")
}

function zoomMap(th) {
// Change zoom-level of the map
  var t = th.replaceAll(" ",""); 
  map.setZoom(parseFloat(t)) 
}

</script>

</head>

<body style="height:100%; margin:0; padding:0;">
&nbsp; Anchor: <input value="33.66848,-117.86359" onChange="shiftMap(this.value)">
&nbsp; Zoom: <input size=5 value=16 onChange="zoomMap(this.value)">
<hr size=1>
<div id=map style="height:100%"> </div>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmrLN2z0y1M2Dg8hvhfBckywh_kDXQC_k&callback=initMap" defer> </script>
  
</body>
