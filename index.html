<!doctype HTML>

<html>

<head>

<title>1M Scout</title>

<META HTTP-EQUIV="Pragma" CONTENT="no-cache">
<META HTTP-EQUIV="Expires" CONTENT="-1">

<link rel="stylesheet" type="text/css" href='style.css' />
  
<script src="UTMProj.js"> </script>
<!-- script src="maplabel1.js"> </script -->

<script>

const R_deg = Math.PI / 180  // Radians per degree
const deg_m = 90 / 1e7  // degrees per m

const anchor = { lng:-117.86359, lat:33.66848 }, icon = 'plus-sign2t.png', level = 16, title = "WFBank"
var map, tile=[]

function initMap() {
  map = new google.maps.Map(document.getElementById("map"), { center:anchor, zoom:level, })
  new google.maps.Marker({ icon:icon, position:anchor, title:title, map, })
  drawTile()
//drawBox(500, "#f0f")
  drawBox(10,"#ff0")
}
  
function drawTile() { //Draw 1x1 km tile
  var u = toUTM(anchor); u.Eing -= u.Eing%10; u.Ning -= u.Ning%10  // UTM of anchor; sets U.Zone 
  var cosLat = Math.cos(anchor.lat*R_deg)
  tile[0] = {lng:(anchor.lng -(500*deg_m)/cosLat), lat:(anchor.lat -(500*deg_m))}
  tile[1] = {lng:(anchor.lng +(500*deg_m)/cosLat), lat:(anchor.lat -(500*deg_m))}
  tile[2] = {lng:(anchor.lng +(500*deg_m)/cosLat), lat:(anchor.lat +(500*deg_m))}
  tile[3] = {lng:(anchor.lng -(500*deg_m)/cosLat), lat:(anchor.lat +(500*deg_m))}
  tile.push(tile[0])
  new google.maps.Polyline({ path:tile, strokeColor:'#f00', strokeWeight:2, map, })
}

function drawBox(modulus, color) { //Draw a box surrounding anchor at modulus distance from it
  const box=[]
  var u = toUTM(anchor) // UTM of anchor; NB: sets U.Zone
  var uEmod = u.Eing -= u.Eing%modulus, uNmod = u.Ning -= u.Ning%modulus  // round down
  box[0] = toLL({lng:uEmod +0, lat:uNmod +0}, U.Zone)
  box[1] = toLL({lng:uEmod +modulus/2, lat:uNmod +0}, U.Zone)
  box[2] = toLL({lng:uEmod +modulus/2, lat:uNmod +modulus/2}, U.Zone)
  box[3] = toLL({lng:uEmod +0, lat:uNmod +modulus/2}, U.Zone)
  tile.push(box[0])
  new google.maps.Polyline({ path:box, strokeColor:color, strokeWeight:2, map, })  
  
function zoomMap(level) {map.setZoom(level)}

</script>

</head>

<body style="height:100%; margin:0; padding:0;">
Zoom: <input size=5 value=16 onChange="zoomMap(parseFloat(this.value))">
<hr size=1>
<div id=map style="height:100%"> </div>


<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDmrLN2z0y1M2Dg8hvhfBckywh_kDXQC_k&callback=initMap" defer> </script>
  
</body>
